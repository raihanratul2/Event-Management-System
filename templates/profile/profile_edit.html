{% extends 'base.html' %}

{% block title %}Edit Profile | Event Management{% endblock title %}

{% block main %}
<div class="container py-5" style="max-width: 720px;">
    <h2 class="mb-4">Edit Profile</h2>
    <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm border-0">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'profile_detail' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock main %}
