{% extends 'base.html' %}

{% block title %}Organizer Dashboard{% endblock title %}

{% block main %}
<div class="container py-4">
    <h2>Organizer Dashboard</h2>
    <div class="row g-3 my-2">
        <div class="col-md-6"><div class="card p-3"><strong>Events</strong><div>{{ events_count }}</div></div></div>
        <div class="col-md-6"><div class="card p-3"><strong>Categories</strong><div>{{ categories_count }}</div></div></div>
    </div>
    <div class="d-flex gap-2 mb-3">
        <a href="{% url 'event_list' %}" class="btn btn-primary">Manage Events</a>
        <a href="{% url 'category_list' %}" class="btn btn-secondary">Manage Categories</a>
    </div>
</div>
{% endblock main %}
