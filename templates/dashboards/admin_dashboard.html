{% extends 'base.html' %}

{% block title %}Admin Dashboard{% endblock title %}

{% block main %}
<div class="container py-4">
    <h2>Admin Dashboard</h2>
    <div class="row g-3 my-2">
        <div class="col-md-4"><div class="card p-3"><strong>Events</strong><div>{{ events_count }}</div></div></div>
        <div class="col-md-4"><div class="card p-3"><strong>Categories</strong><div>{{ categories_count }}</div></div></div>
        <div class="col-md-4"><div class="card p-3"><strong>Participants</strong><div>{{ participants_count }}</div></div></div>
    </div>
    <div class="d-flex gap-2 mb-3">
        <a href="{% url 'event_list' %}" class="btn btn-primary">Manage Events</a>
        <a href="{% url 'participant_list' %}" class="btn btn-secondary">Manage Participants</a>
        <a href="{% url 'manage_groups' %}" class="btn btn-secondary">Manage Groups</a>
        <a href="{% url 'change_user_role' %}" class="btn btn-secondary">Change Roles</a>
    </div>
</div>
{% endblock main %}
