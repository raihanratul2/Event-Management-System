{% extends 'base.html' %}

{% block title %}Edit Event{% endblock title %}

{% block main %}
<div class="container py-4" style="max-width: 760px;">
    <h2>Edit Event</h2>
    <form method="post" enctype="multipart/form-data" class="card p-4 border-0">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock main %}
