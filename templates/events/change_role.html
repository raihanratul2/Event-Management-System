{% extends 'base.html' %}

{% block title %}Change User Role{% endblock title %}

{% block main %}
<div class="container py-4" style="max-width: 760px;">
    <h2>Change User Role</h2>
    <form method="post" class="card p-4 border-0">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.user.id_for_label }}" class="form-label">User</label>
            {{ form.user }}
        </div>
        <div class="mb-3">
            <label for="{{ form.group.id_for_label }}" class="form-label">Role/Group</label>
            {{ form.group }}
        </div>
        <button type="submit" class="btn btn-primary">Update Role</button>
    </form>
</div>
{% endblock main %}
